services:
  postgres:
    image: postgres:15-alpine
    container_name: polierp-db
    environment:
      POSTGRES_USER: polierp
      POSTGRES_PASSWORD: polierp123
      POSTGRES_DB: polierp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polierp"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: polierp-api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://polierp:polierp123@postgres:5432/polierp
      - API_PORT=3000
      - API_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3001
      - JWT_SECRET=change-me-in-production-use-long-random-string
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=change-me-refresh-secret
      - JWT_REFRESH_EXPIRES_IN=7d
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000
    container_name: polierp-web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=change-me-nextauth-secret
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data: