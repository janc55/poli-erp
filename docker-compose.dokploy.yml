# ─────────────────────────────────────────────────────────────
# docker-compose.dokploy.yml
# Despliega el monorepo poli-erp en Dokploy.
#
# Uso en Dokploy:
#   1. Crear un servicio "Docker Compose" en Dokploy
#   2. Apuntar al repositorio Git
#   3. En "Compose Path", poner:  ./docker-compose.dokploy.yml
#   4. Configurar las variables de entorno en el panel de Dokploy
#   5. Configurar dominios para api y web en la sección "Domains"
# ─────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: polierp-api
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - API_PORT=${API_PORT:-3000}
      - API_URL=${API_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
    networks:
      - dokploy-network
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    # Traefik labels (Dokploy puede inyectarlos automáticamente desde su UI,
    # pero puedes descomentarlos si prefieres control manual):
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=dokploy-network"
    #   - "traefik.http.routers.polierp-api.rule=Host(`api.tudominio.com`)"
    #   - "traefik.http.routers.polierp-api.entrypoints=websecure"
    #   - "traefik.http.routers.polierp-api.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.polierp-api.loadbalancer.server.port=3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: polierp-web
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    networks:
      - dokploy-network
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # Traefik labels (ver nota en el servicio api):
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=dokploy-network"
    #   - "traefik.http.routers.polierp-web.rule=Host(`app.tudominio.com`)"
    #   - "traefik.http.routers.polierp-web.entrypoints=websecure"
    #   - "traefik.http.routers.polierp-web.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.polierp-web.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
